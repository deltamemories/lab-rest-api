services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: 1000
        GROUP_ID: 1000
    volumes:
      - ./:/var/www/symfony
    depends_on:
      - mysql
      - redis
      - rabbitmq
    networks:
      - symfony_network
    environment:
      - APP_ENV=test
      - DATABASE_URL="mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}?serverVersion=9.6&charset=utf8mb4"
      - REDIS_URL=redis://redis:6379
      - MESSENGER_TRANSPORT_DSN=amqp://guest:guest@rabbitmq:5672/%2f/messages
      - JWT_PASSPHRASE=${JWT_PASSPHRASE}


  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/symfony
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - symfony_network

  mysql:
    image: mysql:9.6
    container_name: symfony_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - symfony_network

  redis:
    image: redis:8.6-alpine
    container_name: symfony_redis
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - symfony_network

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: symfony_queue
    ports:
      - "127.0.0.1:5672:5672" # connection
      - "127.0.0.1:15672:15672" # panel
    networks:
      - symfony_network

networks:
  symfony_network:
    driver: bridge
